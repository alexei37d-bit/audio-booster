                                                <button onClick={saveProfile} disabled={isSaving} className="flex-1 p-4 rounded-2xl font-bold bg-[#5865f2]">{isSaving ? "Сохранение..." : t.save}</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                )}

                {showNicknameModal && (
                    <div className="fixed inset-0 z-[9000] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4" onClick={() => setShowNicknameModal(false)}>
                        <div className="bg-[#3d2566] w-full max-w-sm rounded-[32px] p-7 border border-white/8 shadow-2xl" onClick={e => e.stopPropagation()}>
                            <div className="flex items-center gap-3 mb-5">
                                <img src={allUsers[nicknameTarget]?.avatar} className="w-11 h-11 rounded-full object-cover flex-shrink-0"/>
                                <div>
                                    <div className="font-bold text-sm">{allUsers[nicknameTarget]?.name}</div>
                                    <div className="text-[11px] text-slate-500">@{nicknameTarget}</div>
                                </div>
                            </div>
                            <div className="text-[11px] text-slate-500 font-bold uppercase tracking-widest mb-2">Имя для собеседника</div>
                            <input
                                autoFocus
                                className="auth-input mb-2"
                                placeholder={`Имя (по умолч. ${allUsers[nicknameTarget]?.name})`}
                                value={nicknameInput}
                                onChange={e => setNicknameInput(e.target.value)}
                            />
                            <div className="text-[10px] text-slate-600 mb-5">Это имя видите только вы — собеседник не узнает</div>
                            <div className="flex gap-3">
                                <button onClick={() => { saveNickname(nicknameTarget, ''); setShowNicknameModal(false); }} className="flex-1 py-3 rounded-2xl bg-white/5 text-slate-400 font-bold text-sm">Сбросить</button>
                                <button onClick={() => { saveNickname(nicknameTarget, nicknameInput.trim()); setShowNicknameModal(false); }} className="flex-1 py-3 rounded-2xl bg-[#5865f2] text-white font-bold text-sm">Сохранить</button>
                            </div>
                        </div>
                    </div>
                )}

                {showVerificationModal && (
                    <div className="fixed inset-0 z-[8000] flex items-center justify-center bg-black/95 backdrop-blur-md p-4" onClick={() => setShowVerificationModal(false)}>
                        <div className="bg-[#3d2566] w-full max-w-md rounded-[40px] p-8 border border-yellow-500/30 shadow-2xl" onClick={e => e.stopPropagation()}>
                            <div className="text-center mb-6">
                                <div className="w-16 h-16 bg-yellow-500/20 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <IconVerified />
                                </div>
                                <h2 className="text-2xl font-black uppercase tracking-wider">{t.verification}</h2>
                                <p className="text-slate-400 text-sm mt-2">{t.verifyQuestion}</p>
                            </div>

                            {verifySuccessMsg && (
                                <div className="bg-green-500/20 border border-green-500/30 rounded-2xl p-3 mb-4 text-center text-green-400 text-sm">
                                    {verifySuccessMsg}
                                </div>
                            )}

                            {verifyError && (
                                <div className="bg-red-500/20 border border-red-500/30 rounded-2xl p-3 mb-4 text-center text-red-400 text-sm">
                                    {verifyError}
                                </div>
                            )}

                            {cooldownUntil > Date.now() ? (
                                <div className="text-center">
                                    <div className="text-4xl font-black text-yellow-500 mb-4">{Math.ceil((cooldownUntil - Date.now()) / 1000)}с</div>
                                    <p className="text-slate-400 text-sm">{t.verifyFrozen}</p>
                                    <button onClick={() => setShowVerificationModal(false)} className="w-full mt-6 py-4 bg-white/5 hover:bg-white/10 rounded-2xl font-bold text-sm">
                                        {t.close}
                                    </button>
                                </div>
                            ) : (
                                <React.Fragment>
                                    <input
                                        className="auth-input text-center text-lg font-bold"
                                        placeholder={t.verifyPlaceholder}
                                        value={verifyAnswer}
                                        onChange={e => setVerifyAnswer(e.target.value)}
                                        onKeyPress={e => e.key === 'Enter' && handleVerification()}
                                        autoFocus
                                    />
                                    <div className="attempts-counter text-center mb-4">
                                        {verifyAttempts < 3 && cooldownUntil <= Date.now() && (
                                            <span>[★] Осталось попыток: {verifyAttempts}</span>
                                        )}
                                    </div>
                                    <div className="flex gap-3 mt-2">
                                        <button onClick={() => setShowVerificationModal(false)} className="flex-1 py-4 rounded-2xl font-bold bg-white/5 text-sm">
                                            {t.cancel}
                                        </button>
                                        <button onClick={handleVerification} className="flex-1 py-4 rounded-2xl font-bold bg-yellow-600 hover:bg-yellow-700 text-sm">
                                            {t.verifyBtn}
                                        </button>
                                    </div>
                                </React.Fragment>
                            )}
                        </div>
                    </div>
                )}

                {showStickerManager && (
                    <div className="fixed inset-0 z-[6000] flex items-center justify-center bg-black/90 p-6 backdrop-blur-md">
                        <div className="bg-[#3d2566] w-full max-w-md rounded-[40px] p-8 border border-white/5 flex flex-col h-[80vh]">
                            <h2 className="text-xl font-black mb-6 text-center uppercase">{t.stickers}</h2>
                            <div className="flex-1 scrollable sticker-grid">
                                {myStickers.map((s, i) => (
                                    <div key={i} className="sticker-item relative group">
                                        <img src={s} className="w-full h-full object-contain" />
                                    </div>
                                ))}
                            </div>
                            <div className="pt-6 space-y-4">
                                <label className="auth-button flex items-center justify-center gap-2">
                                    <IconAdd /> {t.createSticker}
                                    <input type="file" accept="image/*" className="hidden" onChange={e => handleAddSticker(e.target.files[0])} />
                                </label>
                                <button onClick={()=>setShowStickerManager(false)} className="w-full text-slate-500 font-bold uppercase text-xs">{t.close}</button>
                            </div>
                        </div>
                    </div>
                )}

                {showAdmin && (
                    <div className="fixed inset-0 z-[7000] flex items-center justify-center bg-black/90 p-6 backdrop-blur-xl">
                        <div className="bg-[#3d2566] w-full max-w-2xl rounded-[40px] p-10 border border-white/10 shadow-2xl h-[80vh] flex flex-col">
                            <h2 className="text-2xl font-black mb-8 text-center uppercase tracking-widest text-yellow-500">{t.admin}</h2>
                            <div className="grid grid-cols-2 gap-4 mb-8">
                                <div className="bg-white/5 p-4 rounded-3xl border border-white/5 text-center">
                                    <div className="text-slate-400 text-[10px] font-bold uppercase mb-1">{t.totalUsers}</div>
                                    <div className="text-2xl font-black">{stats.users}</div>
                                </div>
                                <div className="bg-white/5 p-4 rounded-3xl border border-white/5 text-center">
                                    <div className="text-slate-400 text-[10px] font-bold uppercase mb-1">{t.totalMsgs}</div>
                                    <div className="text-2xl font-black">{stats.msgs}</div>
                                </div>
                            </div>
                            <div className="flex-1 scrollable space-y-3">
                                {Object.values(allUsers).map(u => (
                                    <div key={u.username} className="bg-white/5 p-4 rounded-2xl flex items-center justify-between">
                                        <div className="flex items-center gap-3">
                                            <img src={u.avatar} className="w-8 h-8 rounded-lg"/>
                                            <div>
                                                <div className="name-with-badges">
                                                    <span className="text-xs font-bold">{u.name}</span>
                                                    <OfficialBadge uname={u.username} allUsers={allUsers}/>
                                                </div>
                                                <div className="text-[10px] opacity-50">@{u.username}</div>
                                                {u.isVerified && <span className="text-[8px] text-green-400">Верифицирован</span>}
                                                {u.isFrozen && <span className="text-[8px] text-red-400 ml-1">❄️ Заморожен</span>}
                                            </div>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={() => db.ref(`v10_users/${u.username}/isVerified`).set(!u.isVerified)} className={`p-2 rounded-lg ${u.isVerified?'bg-green-500 text-white':'bg-white/10 text-white'}`}>
                                                <IconVerified />
                                            </button>
                                            <button onClick={() => u.isFrozen ? handleUnfreezeUser(u.username) : handleFreezeUser(u.username)} className={`p-2 rounded-lg ${u.isFrozen?'bg-green-500/30 text-green-400':'bg-red-500/30 text-red-400'}`}>
                                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2v20M21 12H3"/><circle cx="12" cy="12" r="4"/></svg>
                                            </button>
                                            {u.username !== 'securechat' && u.username !== 'botsecure' && <button onClick={() => showSysConfirm(`Удалить ${u.username}?`, 'Аккаунт будет помечен как удаленный', '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3.05h16.94a2 2 0 0 0 1.71-3.05L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>', () => db.ref(`v10_users/${u.username}/isDeleted`).set(true))} className="p-2 rounded-lg bg-red-500/20 text-red-500">
                                                <IconDelete />
                                            </button>}
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <button onClick={() => setShowAdmin(false)} className="auth-button mt-6">{t.close}</button>
                        </div>
                    </div>
                )}

                {showGroupSettings && (
                    <div className="fixed inset-0 z-[5500] flex items-center justify-center bg-black/90 p-4">
                        <div className="bg-[#3d2566] w-full max-w-md rounded-[40px] p-8 border border-white/5 flex flex-col max-h-[85vh]">
                            <h2 className="text-xl font-black mb-6 uppercase text-center">{t.settings}</h2>
                            <div className="scrollable pr-2 space-y-4">
                                <div className="flex flex-col items-center mb-4">
                                    <img src={allGroups[activeChat]?.avatar} className="w-20 h-20 rounded-3xl object-cover mb-2 border-2 border-white/10" />
                                    <label className="text-xs text-blue-400 font-bold cursor-pointer">Photo<input type="file" className="hidden" accept="image/*" onChange={async e => {
                                        const img = await compressImage(e.target.files[0]);
                                        db.ref(`v10_groups/${activeChat}/avatar`).set(img);
                                    }}/></label>
                                </div>
                                <input className="auth-input" value={allGroups[activeChat]?.name} onChange={e => db.ref(`v10_groups/${activeChat}/name`).set(e.target.value)} placeholder={t.name}/>
                                <textarea className="auth-input h-20 resize-none" value={allGroups[activeChat]?.about} onChange={e => db.ref(`v10_groups/${activeChat}/about`).set(e.target.value)} placeholder={t.about}/>
                                <div className="text-[10px] font-bold text-slate-500 uppercase mt-4 mb-2">{t.members}</div>
                                {Object.keys(allGroups[activeChat]?.members || {}).map(mUname => (
                                    <div key={mUname} className="flex items-center justify-between p-3 bg-white/5 rounded-2xl">
                                        <div className="flex items-center gap-2">
                                            <img src={allUsers[mUname]?.avatar} className="w-6 h-6 rounded-lg"/>
                                            <div className="name-with-badges">
                                                <span className="text-sm font-bold">{mUname}</span>
                                                <OfficialBadge uname={mUname} allUsers={allUsers}/>
                                            </div>
                                        </div>
                                        {mUname !== user.username && <button onClick={() => kickMember(mUname)} className="text-red-500 p-2">
                                            <IconDelete />
                                        </button>}
                                    </div>
                                ))}
                            </div>
                            <div className="pt-6 space-y-3">
                                <button onClick={deleteGroup} className="w-full py-4 text-red-500 font-bold hover:bg-red-500/5 rounded-2xl text-xs uppercase">{t.deleteGrp}</button>
                                <button onClick={() => setShowGroupSettings(false)} className="auth-button">{t.done}</button>
                            </div>
                        </div>
                    </div>
                )}

                {showCreateGroup && (
                    <div className="fixed inset-0 z-[5000] flex items-center justify-center bg-black/90 p-6 backdrop-blur-md">
                        <div className="bg-[#3d2566] w-full max-w-sm rounded-[40px] p-8 border border-white/5">
                            <h2 className="text-xl font-black mb-6 text-center uppercase">{t.createGroup}</h2>
                            <img src={groupForm.avatar} className="w-20 h-20 rounded-3xl mx-auto mb-4 object-cover border-2 border-white/10" />
                            <label className="text-center block text-xs text-slate-500 mb-4 cursor-pointer">Photo<input type="file" accept="image/*" onChange={async e => setGroupForm({...groupForm, avatar: await compressImage(e.target.files[0])})} className="hidden"/></label>
                            <input className="auth-input" placeholder={t.name} value={groupForm.name} onChange={e=>setGroupForm({...groupForm, name:e.target.value})} />
                            <input className="auth-input" placeholder="@username" value={groupForm.username} onChange={e=>setGroupForm({...groupForm, username:e.target.value})} />
                            <button onClick={handleCreateGroup} className="auth-button">{t.createGroup}</button>
                            <button onClick={()=>setShowCreateGroup(false)} className="w-full mt-4 text-slate-500 font-bold">{t.cancel}</button>
                        </div>
                    </div>
                )}

                {showContacts && (
                    <div className="fixed inset-0 z-[5000] flex items-center justify-center bg-black/90 p-6 backdrop-blur-md" onClick={() => setShowContacts(false)}>
                        <div className="bg-[#3d2566] w-full max-w-sm rounded-[40px] p-8 border border-white/5 h-[70vh] flex flex-col" onClick={e => e.stopPropagation()}>
                            <h2 className="text-xl font-black mb-6 text-center uppercase italic">{t.contacts}</h2>
                            <div className="flex-1 scrollable space-y-2">
                                {(user?.contacts || []).map(uname => (
                                    <div key={uname} onClick={() => { setActiveChat(uname); setIsGroupMode(false); setShowContacts(false); }} className="flex items-center p-3 hover:bg-white/5 rounded-2xl cursor-pointer">
                                        <img src={allUsers[uname]?.avatar} className="w-10 h-10 rounded-xl mr-3 object-cover" />
                                        <div className="name-with-badges">
                                            <span className="font-bold text-sm">{allUsers[uname]?.name || uname}</span>
                                            <OfficialBadge uname={uname} allUsers={allUsers}/>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <button onClick={() => setShowContacts(false)} className="mt-4 auth-button">{t.close}</button>
                        </div>
                    </div>
                )}

                {(showAllGroups || showMyGroups) && (
                    <div className="fixed inset-0 z-[5000] flex items-center justify-center bg-black/90 p-6 backdrop-blur-md" onClick={()=> {setShowAllGroups(false); setShowMyGroups(false);}}>
                        <div className="bg-[#3d2566] w-full max-w-sm rounded-[40px] p-8 border border-white/5 h-[70vh] flex flex-col" onClick={e=>e.stopPropagation()}>
                            <h2 className="text-xl font-black mb-6 text-center uppercase italic">{showMyGroups ? t.myGroups : t.groups}</h2>
                            <div className="flex-1 scrollable space-y-2">
                                {Object.values(allGroups).filter(g => showMyGroups ? g.members?.[user?.username] : true).map(g => (
                                    <div key={g.username} onClick={() => { setActiveChat(g.username); setIsGroupMode(true); setShowAllGroups(false); setShowMyGroups(false); }} className="flex items-center p-3 hover:bg-white/5 rounded-2xl cursor-pointer">
                                        <img src={g.avatar} className="w-10 h-10 rounded-xl mr-3 object-cover" />
                                        <div>
                                            <div className="name-with-badges">
                                                <span className="font-bold text-sm">{g.name}</span>
                                            </div>
                                            <div className="text-[10px] text-slate-500">@{g.username}</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <button onClick={()=>{setShowAllGroups(false); setShowMyGroups(false);}} className="mt-4 auth-button">{t.close}</button>
                        </div>
                    </div>
                )}

                {/* ARCHIVE MODAL */}
                {showArchiveModal && (
                    <div className="fixed inset-0 z-[5000] flex items-center justify-center bg-black/90 p-6 backdrop-blur-md" onClick={() => setShowArchiveModal(false)}>
                        <div className="bg-[#3d2566] w-full max-w-sm rounded-[40px] p-8 border border-white/5 h-[70vh] flex flex-col" onClick={e => e.stopPropagation()}>
                            <h2 className="text-xl font-black mb-6 text-center uppercase italic flex items-center justify-center gap-3">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
                                </svg>
                                Архив
                            </h2>
                            <div className="flex-1 scrollable space-y-2">
                                {archivedChats.map(key => {
                                    const [type, id] = key.split(':');
                                    if (!type || !id) return null;
                                    const isUser = type === 'user';
                                    const avatar = isUser ? allUsers[id]?.avatar : allGroups[id]?.avatar;
                                    const name = isUser ? getDisplayName(id) : allGroups[id]?.name;
                                    const sub = isUser ? `@${id}` : `${Object.keys(allGroups[id]?.members||{}).length} уч.`;

                                    if (!avatar) return null;

                                    return (
                                        <div key={key} className="flex items-center justify-between p-3 hover:bg-white/5 rounded-2xl">
                                            <div className="flex items-center gap-3 flex-1 cursor-pointer" onClick={() => { setActiveChat(id); setIsGroupMode(!isUser); setShowArchiveModal(false); }}>
                                                <img src={avatar} className="w-10 h-10 rounded-xl object-cover" />
                                                <div className="flex-1 min-w-0">
                                                    <div className="font-bold text-sm truncate">{name}</div>
                                                    <div className="text-[11px] text-slate-500">{sub}</div>
                                                </div>
                                            </div>
                                            <button
                                                onClick={() => unarchiveChat(key)}
                                                className="ml-2 p-2 text-blue-400 hover:bg-blue-500/10 rounded-lg transition-all"
                                                title="Восстановить"
                                            >
                                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
                                                </svg>
                                            </button>
                                        </div>
                                    );
                                })}
                                {archivedChats.length === 0 && (
                                    <div className="text-center text-slate-600 text-sm py-12">Архив пуст</div>
                                )}
                            </div>
                            <button onClick={() => setShowArchiveModal(false)} className="mt-4 auth-button">Закрыть</button>
                        </div>
                    </div>
                )}
                
                {/* DELETE CONFIRMATION MODAL (NEW) */}
                {showDeleteConfirm && (
                    <div className="delete-confirm-modal" onClick={() => setShowDeleteConfirm(false)}>
                        <div className="delete-confirm-box" onClick={e => e.stopPropagation()}>
                            <div className="delete-confirm-title">
                                Удалить {selectedMessageIds.size} {selectedMessageIds.size === 1 ? 'сообщение' : 'сообщений'}?
                            </div>
                            <div className="delete-confirm-text">
                                {deleteTarget === 'all' 
                                    ? 'Сообщение будет удалено для всех' 
                                    : 'Сообщение будет удалено только для вас'}
                            </div>
                            <div className="delete-confirm-buttons">
                                <button 
                                    className="delete-confirm-btn danger"
                                    onClick={() => confirmDeleteMessages(deleteTarget === 'all')}
                                >
                                    Удалить
                                </button>
                                <button 
                                    className="delete-confirm-btn cancel"
                                    onClick={() => {
                                        setShowDeleteConfirm(false);
                                        setDeleteTarget(null);
                                    }}
                                >
                                    Отмена
                                </button>
                            </div>
                        </div>
                    </div>
                )}
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
    setTimeout(() => { if(window.lucide) lucide.createIcons(); }, 1000);
</script>
</body>
</html>
